server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static files; fall back to index.html for hash-based nav
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets lightly
    location ~* \.(js|css|jpg|jpeg|png|gif|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
